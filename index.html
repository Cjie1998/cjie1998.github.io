<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>生日快乐！</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffafbd, #ffc3a0);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 90%;
      width: 500px;
    }
    .photo {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid #ff6b6b;
      margin: 20px 0;
    }
    h1 {
      color: #ff6b6b;
      font-size: 2.5rem;
      margin: 10px 0;
    }
    p {
      font-size: 1.2rem;
      color: #555;
      line-height: 1.6;
    }
    .confetti {
      font-size: 2rem;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="confetti">🎉🎂🎁</div>
    <h1>生日快乐！</h1>
    
    <!-- 替换下面的 src 为你朋友的照片 -->
    <img src="/yinwei.jpg" alt="寿星" class="photo">
    
    <p>亲爱的朋友，<br>
       愿你新的一岁平安喜乐，梦想成真！<br>
       感谢一路有你 ❤️</p>
       
    <div class="confetti">🎈✨🎊</div>
  </div>
</body>
</html>
