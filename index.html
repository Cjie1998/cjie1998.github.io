<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎂 生日快乐！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffafbd, #ffc3a0, #d4a5ff, #ffecd2, #ffafbd, #fcb69f);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      margin: 0;
      padding: clamp(8px, 3vw, 20px);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ============ CSS彩带动画 ============ */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .confetti-piece {
      position: absolute;
      width: 12px;
      height: 12px;
      top: -30px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 1;
      }
      10% {
        opacity: 1;
      }
      25% {
        transform: translateY(25vh) translateX(30px) rotate(120deg);
        opacity: 0.9;
      }
      50% {
        transform: translateY(50vh) translateX(-20px) rotate(240deg);
        opacity: 0.75;
      }
      75% {
        transform: translateY(75vh) translateX(25px) rotate(320deg);
        opacity: 0.5;
      }
      90% {
        opacity: 0.2;
      }
      100% {
        transform: translateY(105vh) translateX(-15px) rotate(400deg);
        opacity: 0;
      }
    }

    /* 不同形状的彩带 */
    .confetti-piece.circle {
      border-radius: 50%;
    }
    .confetti-piece.square {
      border-radius: 2px;
    }
    .confetti-piece.triangle {
      width: 0;
      height: 0;
      background: transparent !important;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 12px solid;
    }

    /* ============ 主卡片样式 ============ */
    .card {
      background:
        radial-gradient(circle, rgba(255,107,107,0.13) 1.5px, transparent 1.5px) 0 0 / 15px 15px,
        white;
      border-radius: clamp(15px, 3vw, 20px);
      padding: clamp(15px, 4vw, 30px);
      padding-top: 0;  /* 让顶部渐变条贴边 */
      box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 10px 30px rgba(0,0,0,0.2);
      animation: cardBounce 0.6s ease-out, cardGlow 2.5s ease-in-out 0.6s infinite;
      width: min(90vw, 500px);
      position: relative;
      z-index: 10;
      overflow: hidden;  /* 让渐变条圆角裁切 */
    }

    @keyframes cardGlow {
      0%   { box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 10px 30px rgba(0,0,0,0.2); }
      50%  { box-shadow: 0 0 70px rgba(255,215,0,0.7), 0 0 100px rgba(255,180,0,0.4), 0 10px 30px rgba(0,0,0,0.2); }
      100% { box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 10px 30px rgba(0,0,0,0.2); }
    }

    @keyframes cardBounce {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 顶部渐变丝带 */
    .ribbon {
      width: 100%;
      height: clamp(4px, 0.8vw, 6px);
      background: linear-gradient(90deg, #ff6b6b, #ffd700, #ff922b, #ff6b6b);
      background-size: 200% 200%;
      animation: ribbonShimmer 3s ease-in-out infinite;
      border-radius: 0 0 2px 2px;
    }

    @keyframes ribbonShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 照片标签 */
    .photo-caption {
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: #ff6b6b;
      margin-top: clamp(4px, 1vw, 8px);
      letter-spacing: clamp(2px, 0.5vw, 4px);
      opacity: 0.75;
    }

    .photo-frame {
      display: inline-block;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      margin: clamp(12px, 3vw, 20px) 0;
      box-shadow: 0 5px 15px rgba(255,107,107,0.3);
    }

    .photo-frame img {
      width: clamp(130px, 35vw, 200px);
      height: clamp(130px, 35vw, 200px);
      object-fit: cover;
      display: block;
      border: clamp(3px, 1vw, 5px) solid #ff6b6b;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .photo-frame:hover img {
      transform: scale(1.05) rotate(3deg);
    }

    /* 照片光泽划过 */
    .photo-frame::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-20deg);
      animation: photoShine 3.5s ease-in-out infinite;
    }

    @keyframes photoShine {
      0%   { left: -100%; }
      40%  { left: 160%; }
      100% { left: 160%; }
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      margin: clamp(6px, 1.5vw, 10px) 0;
      background: linear-gradient(135deg, #ff6b6b, #ffd700, #ff6b6b);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      animation: titleShine 2.5s ease-in-out infinite;
    }

    @keyframes titleShine {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    p { font-size: clamp(0.9rem, 2.5vw, 1.2rem); color: #555; line-height: 1.6; }

    /* 装饰分隔线 */
    .divider {
      margin: clamp(4px, 1.5vw, 10px) 0 clamp(2px, 0.8vw, 5px);
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      color: #ffb6c1;
      letter-spacing: clamp(2px, 0.6vw, 4px);
      animation: dividerPulse 2s ease-in-out infinite;
    }

    @keyframes dividerPulse {
      0%   { opacity: 0.5; }
      50%  { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .hidden-wish {
      display: none;
      margin-top: clamp(12px, 3vw, 20px);
      padding: clamp(10px, 2vw, 15px);
      background: #fff3cd;
      border-radius: 10px;
      border: 2px dashed #ffc107;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .surprise-btn {
      margin-top: clamp(12px, 3vw, 20px);
      padding: clamp(10px, 2vw, 12px) clamp(20px, 5vw, 30px);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,107,107,0.4);
      position: relative;
      overflow: hidden;
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    .surprise-btn:hover {
      transform: scale(1.05);
      background: #ff5252;
      box-shadow: 0 6px 20px rgba(255,107,107,0.6);
      animation: none;
    }
    .surprise-btn:active {
      transform: scale(0.95);
    }

    @keyframes heartbeat {
      0%   { transform: scale(1); }
      8%   { transform: scale(1.08); }
      16%  { transform: scale(1); }
      24%  { transform: scale(1.05); }
      32%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    
    .music-toggle {
      position: fixed;
      bottom: clamp(10px, 3vw, 20px);
      right: clamp(10px, 3vw, 20px);
      width: clamp(40px, 8vw, 50px);
      height: clamp(40px, 8vw, 50px);
      border-radius: 50%;
      background: white;
      border: 2px solid #ff6b6b;
      font-size: clamp(1.2rem, 2.5vw, 1.5rem);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    .music-toggle:hover {
      transform: scale(1.1);
      background: #fff5f5;
    }

    /* ============ 背景漂浮装饰 ============ */
    .floating-decorations {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .float-item {
      position: absolute;
      left: var(--x);
      top: var(--y);
      font-size: var(--s);
      opacity: 0.4;
      animation: floatAround var(--tf) ease-in-out infinite;
      animation-delay: var(--td);
    }

    /* 子元素负责忽大忽小的闪烁 */
    .float-item .twinkle {
      display: inline-block;
      animation: twinkle var(--tw) ease-in-out infinite;
      animation-delay: calc(var(--td) * 0.7);
    }

    @keyframes floatAround {
      0%   { transform: translateY(0)    translateX(0)    rotate(0deg);  }
      25%  { transform: translateY(-25px) translateX(10px)  rotate(5deg);  }
      50%  { transform: translateY(-10px) translateX(-8px)  rotate(-3deg); }
      75%  { transform: translateY(-30px) translateX(5px)   rotate(4deg);  }
      100% { transform: translateY(0)    translateX(0)     rotate(0deg);  }
    }

    @keyframes twinkle {
      0%   { transform: scale(1);   }
      25%  { transform: scale(1.3); }
      50%  { transform: scale(0.8); }
      75%  { transform: scale(1.25);}
      100% { transform: scale(1);   }
    }
  </style>
</head>
<body>
  <!-- 🎵 背景音乐 -->
  <audio id="bgm" loop preload="auto">
    <source src="./birthday.mp3" type="audio/mpeg">
  </audio>

  <!-- 🌈 CSS彩带容器 -->
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- 🎈 背景漂浮装饰 -->
  <div class="floating-decorations">
    <span class="float-item" style="--x:3%;  --y:8%;  --s:2rem;   --td:0s;   --tf:5s;  --tw:2.2s"><span class="twinkle">🌸</span></span>
    <span class="float-item" style="--x:88%; --y:12%; --s:2.8rem; --td:0.7s; --tf:7s;  --tw:2.5s"><span class="twinkle">💫</span></span>
    <span class="float-item" style="--x:7%;  --y:65%; --s:2.2rem; --td:1.4s; --tf:6s;  --tw:2.0s"><span class="twinkle">🎈</span></span>
    <span class="float-item" style="--x:82%; --y:78%; --s:1.8rem; --td:2.1s; --tf:5.5s;--tw:2.8s"><span class="twinkle">✨</span></span>
    <span class="float-item" style="--x:48%; --y:4%;  --s:2.6rem; --td:0.4s; --tf:6.5s;--tw:2.1s"><span class="twinkle">💖</span></span>
    <span class="float-item" style="--x:94%; --y:42%; --s:1.6rem; --td:2.8s; --tf:4.8s;--tw:2.4s"><span class="twinkle">🌷</span></span>
    <span class="float-item" style="--x:2%;  --y:38%; --s:2rem;   --td:1.1s; --tf:5.8s;--tw:2.6s"><span class="twinkle">⭐</span></span>
    <span class="float-item" style="--x:42%; --y:88%; --s:2.4rem; --td:2.5s; --tf:6.2s;--tw:2.3s"><span class="twinkle">💝</span></span>

    <span class="float-item" style="--x:20%; --y:25%; --s:3rem;   --td:0.3s; --tf:6.8s;--tw:2.7s"><span class="twinkle">🎀</span></span>
    <span class="float-item" style="--x:75%; --y:30%; --s:2.2rem; --td:1.8s; --tf:5.2s;--tw:2.0s"><span class="twinkle">🌸</span></span>
    <span class="float-item" style="--x:15%; --y:82%; --s:2rem;   --td:0.9s; --tf:6.3s;--tw:2.9s"><span class="twinkle">💫</span></span>
    <span class="float-item" style="--x:60%; --y:15%; --s:1.8rem; --td:3.1s; --tf:5.7s;--tw:2.2s"><span class="twinkle">🦋</span></span>
    <span class="float-item" style="--x:55%; --y:70%; --s:2.6rem; --td:1.6s; --tf:6.1s;--tw:2.4s"><span class="twinkle">✨</span></span>
    <span class="float-item" style="--x:32%; --y:50%; --s:2.4rem; --td:2.3s; --tf:5.4s;--tw:2.6s"><span class="twinkle">🌺</span></span>
    <span class="float-item" style="--x:68%; --y:55%; --s:2rem;   --td:3.4s; --tf:6.6s;--tw:2.1s"><span class="twinkle">💖</span></span>
    <span class="float-item" style="--x:90%; --y:65%; --s:1.8rem; --td:0.6s; --tf:5.1s;--tw:2.8s"><span class="twinkle">🎈</span></span>
    <span class="float-item" style="--x:25%; --y:5%;  --s:2.2rem; --td:2.0s; --tf:6.9s;--tw:2.3s"><span class="twinkle">⭐</span></span>
    <span class="float-item" style="--x:78%; --y:92%; --s:2.8rem; --td:1.3s; --tf:5.6s;--tw:2.5s"><span class="twinkle">🎀</span></span>
    <!-- 顶部中央大蝴蝶结 -->
    <span class="float-item" style="--x:42%; --y:-2%; --s:3.5rem; --td:0s; --tf:7s; --tw:2s; opacity:0.55;"><span class="twinkle">🎀</span></span>
  </div>

  <div class="card">
    <!-- 顶部渐变丝带 -->
    <div class="ribbon"></div>

    <div style="font-size:clamp(1.4rem, 3vw, 2rem); margin-bottom:clamp(6px, 1.5vw, 10px); padding-top:clamp(8px, 2vw, 12px);">🎉🎂🎁</div>
    <h1>生日快乐！</h1>
    
    <!-- 使用本地照片 -->
    <div class="photo-frame">
      <img src="./photo.jpg" alt="寿星" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%3E%3Crect%20fill%3D%22%23ffb6c1%22%20width%3D%22200%22%20height%3D%22200%22%2F%3E%3Ctext%20fill%3D%22white%22%20font-size%3D%2220%22%20x%3D%2250%22%20y%3D%22110%22%3E🌟%20寿星%20🌟%3C%2Ftext%3E%3C%2Fsvg%3E'">
    </div>

    <!-- 照片标签 -->
    <div class="photo-caption">🌸 小英 🌸</div>

    <!-- 装饰分隔线 -->
    <div class="divider">
      <span>~</span> ✨ ❤️ ✨ <span>~</span>
    </div>

    <p>可爱的小英，<br>愿你新的一岁平安喜乐，梦想成真！<br>网络有延迟，我的祝福没有！ ❤️</p>
    
    <button class="surprise-btn" id="surpriseBtn">🎁 点击领取专属祝福</button>
    <div id="hiddenWish" class="hidden-wish">
      <p style="margin:0; color:#856404; font-weight:bold;">
        你是我见过最温暖的人，<br>
        愿所有美好都如期而至！<br>
        记得喂小火人！！！<br>
        （永远支持你的杰）
      </p>
    </div>
  </div>

  <!-- 音乐开关按钮 -->
  <button class="music-toggle" id="musicBtn">🔊</button>

  <script>
    // ============ 彩色纸片生成器 ============
    const confettiContainer = document.getElementById('confettiContainer');
    const colors = [
      '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b',
      '#ff6eb4', '#845ef7', '#20c997', '#f06595', '#ffa94d',
      '#94d82d', '#fcc419', '#ff8787', '#ff6b6b', '#ffd93d'
    ];
    const shapes = ['circle', 'square', 'triangle'];

    // 创建一个彩带碎片，动画结束后自动移除
    function spawnConfettiPiece() {
      const piece = document.createElement('div');
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];

      piece.className = `confetti-piece ${shape}`;
      piece.style.left = Math.random() * 100 + '%';
      piece.style.backgroundColor = shape !== 'triangle' ? color : 'transparent';
      if (shape === 'triangle') {
        piece.style.borderBottomColor = color;
      }
      // 下落持续 3~6 秒
      piece.style.animationDuration = (Math.random() * 3 + 3) + 's';
      // 随机延迟，避免所有碎片同时开始
      piece.style.animationDelay = Math.random() * 2 + 's';
      piece.style.width = (Math.random() * 10 + 6) + 'px';
      piece.style.height = shape !== 'triangle' ? (Math.random() * 10 + 6) + 'px' : '0';

      // 动画结束后自动移除
      piece.addEventListener('animationend', function() {
        piece.remove();
      });

      confettiContainer.appendChild(piece);
    }

    // 一次性生成大量彩带（用于点击惊喜按钮）
    function burstConfetti(count) {
      for (let i = 0; i < count; i++) {
        // 错开生成，避免所有碎片同时落下
        setTimeout(function() {
          spawnConfettiPiece();
        }, Math.random() * 800);
      }
    }

    // 持续不断生成彩带
    function startContinuousConfetti() {
      // 初始来一波
      burstConfetti(60);
      // 每隔一小段时间生成几个碎片，保持彩带不断
      setInterval(function() {
        for (let i = 0; i < 3; i++) {
          spawnConfettiPiece();
        }
      }, 300);
    }

    // ============ 音乐控制 ============
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    let musicPlaying = true;

    function updateMusicIcon() {
      musicBtn.textContent = musicPlaying ? '🔊' : '🔇';
    }

    function playMusic() {
      bgm.play().then(() => {
        musicPlaying = true;
        updateMusicIcon();
        console.log('✅ 音乐开始播放');
      }).catch((err) => {
        console.log('⏳ 音乐播放需要用户交互:', err.message);
        musicPlaying = false;
        updateMusicIcon();
      });
    }

    function toggleMusic() {
      if (musicPlaying) {
        bgm.pause();
        musicPlaying = false;
      } else {
        playMusic();
      }
      updateMusicIcon();
    }

    // 页面加载时尝试自动播放
    window.addEventListener('load', () => {
      console.log('📄 页面加载完成');
      
      // 启动彩带
      startContinuousConfetti();
      
      // 尝试自动播放音乐
      playMusic();
      
      // 如果自动播放失败，在用户第一次交互时播放
      if (!musicPlaying) {
        const playOnInteraction = () => {
          playMusic();
          document.removeEventListener('click', playOnInteraction);
          document.removeEventListener('touchstart', playOnInteraction);
          document.removeEventListener('scroll', playOnInteraction);
        };
        
        document.addEventListener('click', playOnInteraction, { once: true });
        document.addEventListener('touchstart', playOnInteraction, { once: true });
        document.addEventListener('scroll', playOnInteraction, { once: true });
      }
    });

    // 如果DOM已经加载完成（以防万一）
    if (document.readyState === 'complete') {
      startContinuousConfetti();
      playMusic();
    }

    // 音乐按钮点击事件
    musicBtn.addEventListener('click', toggleMusic);

    // 监听音乐播放状态
    bgm.addEventListener('play', () => {
      musicPlaying = true;
      updateMusicIcon();
    });
    
    bgm.addEventListener('pause', () => {
      musicPlaying = false;
      updateMusicIcon();
    });

    // ============ 隐藏祝福 ============
    document.getElementById('surpriseBtn').addEventListener('click', function() {
      const wish = document.getElementById('hiddenWish');
      wish.style.display = 'block';
      
      // 点击时额外发射一波彩带
      burstConfetti(80);
      
      // 如果音乐还没播放，点击后播放
      if (!musicPlaying) {
        playMusic();
      }
      
      // 平滑滚动到祝福区域（仅大屏幕需要）
      if (window.innerWidth > 768) {
        wish.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  </script>
</body>
</html>
